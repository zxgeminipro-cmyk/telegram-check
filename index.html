<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Страница</title>
    <style>
        /* Ваш исходный стиль */
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f0f0; 
            font-family: 'Courier New', Courier, monospace;
        }
        img { 
            max-width: 90%; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            margin-bottom: 20px;
        }

        /* Стиль счетчика */
        .counter-container {
            background-color: #000;
            color: #00ff41; /* Кибер-зеленый */
            padding: 10px 20px;
            border: 1px solid #00ff41;
            border-radius: 4px;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        #visits {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img src="image.jpg" alt="Описание картинки">

    <div class="counter-container">
        Система трекинга: <span id="visits">Загрузка...</span> посещений
    </div>

    <script data-goatcounter="https://manifesto.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

    <script>
        async function updateVisitCount() {
            try {
                // Запрашиваем суммарную статистику (TOTAL) из вашего аккаунта manifesto
                const response = await fetch('https://manifesto.goatcounter.com/counter/TOTAL.json');
                const data = await response.json();
                
                // Отображаем число. Если данных нет, покажет 0.
                document.getElementById('visits').innerText = data.count || 0;
            } catch (error) {
                console.error("Ошибка получения данных:", error);
                document.getElementById('visits').innerText = "ERROR";
            }
        }

        // Запускаем через секунду, чтобы счетчик успел обновиться
        setTimeout(updateVisitCount, 1000);
    </script>

</body>
</html>
