<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Страница</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        img { max-width: 90%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>


    <style>
    .counter-box {
        font-family: 'Courier New', Courier, monospace;
        color: #00ff41;
        background-color: #000;
        padding: 15px;
        border: 1px solid #00ff41;
        display: inline-block;
        border-radius: 5px;
        text-transform: uppercase;
        box-shadow: 0 0 10px #00ff41;
    }
    #visits {
        font-weight: bold;
        font-size: 1.2em;
        color: #fff;
    }
</style>

<div class="counter-box">
    [ СИСТЕМА МОНИТОРИНГА ТРАФИКА ]<br>
    ВСЕГО ПОДКЛЮЧЕНИЙ: <span id="visits">0</span>
</div>

<script data-goatcounter="https://manifesto.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<script>
    // Функция для получения числа из API GoatCounter
    async function updateCounter() {
        try {
            // Запрашиваем общее количество просмотров для вашего домена
            const response = await fetch('https://manifesto.goatcounter.com/counter//total.json');
            const data = await response.json();
            document.getElementById('visits').innerText = data.count;
        } catch (e) {
            console.log("Ошибка загрузки данных счетчика");
            document.getElementById('visits').innerText = "ERROR";
        }
    }
    
    // Запускаем обновление через пару секунд после загрузки
    setTimeout(updateCounter, 1000);
</script>
    
<body>
    
    <img src="image.jpg" alt="Описание картинки">

    </body>
</html>
